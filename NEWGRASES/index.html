<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGE - Google Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Login Section -->
    <div id="loginSection" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 text-center">
            <h2 class="text-3xl font-extrabold mb-2 text-blue-700">NGE</h2>
            <p class="text-gray-500 mb-8">NEWGRACE ENTERPRISES PVT. LTD.</p>
            
            <button onclick="loginWithGoogle()" class="flex items-center justify-center gap-3 w-full border-2 border-gray-300 p-3 rounded-lg hover:bg-gray-50 transition-all font-medium">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_site/google.svg" class="w-6 h-6">
                Sign in with Google
            </button>
            
            <p id="loadingMsg" class="mt-4 text-sm text-blue-600 hidden">Checking your account...</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboardSection" class="hidden min-h-screen">
        <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg">
            <h1 class="text-xl font-bold">NGE Portal (<span id="roleLabel">...</span>)</h1>
            <div class="flex items-center gap-4">
                <span id="userEmailLabel" class="text-sm font-medium"></span>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-1 rounded text-sm transition-colors">Logout</button>
            </div>
        </nav>

        <main class="p-6">
            <!-- Admin View -->
            <div id="adminView" class="hidden">
                <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
                    <input type="text" onkeyup="searchEmployee(this.value)" placeholder="Search Name, Email or ID..." class="p-3 border rounded-lg w-full md:w-1/3 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <div class="bg-blue-50 px-4 py-2 rounded-lg text-blue-800 font-medium self-start">
                        Total Employees: <span id="empCount">0</span>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-700 uppercase text-xs font-bold">
                            <tr>
                                <th class="p-4">Employee</th>
                                <th class="p-4">Designation</th>
                                <th class="p-4">Contact</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <!-- Employee View -->
            <div id="employeeView" class="hidden flex justify-center mt-10">
                <div id="myDetailsCard" class="bg-white p-8 rounded-2xl shadow-2xl border-t-8 border-blue-600 w-full max-w-md text-center">
                    <div class="animate-pulse">Loading your data...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- FIREBASE CONFIG (APNE CONSOLE SE COPY KAREIN) ---
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA_Xe1b5ru1l4_aSzOXVGCbiuLxK53So70",
  authDomain: "newgrace-enterprises.firebaseapp.com",
  projectId: "newgrace-enterprises",
  storageBucket: "newgrace-enterprises.firebasestorage.app",
  messagingSenderId: "429562265089",
  appId: "1:429562265089:web:9a02e3acbea803b6a9ca00",
  measurementId: "G-RB1PSX5B89"
};
        // ---------------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // UI Elements
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const adminView = document.getElementById('adminView');
        const employeeView = document.getElementById('employeeView');
        const loadingMsg = document.getElementById('loadingMsg');

        // Google Sign-In Function
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            loadingMsg.classList.remove('hidden');
            try {
                await auth.signInWithPopup(provider);
            } catch (e) {
                alert("Login Failed: " + e.message);
                loadingMsg.classList.add('hidden');
            }
        }

        // Listen for Auth Changes
        auth.onAuthStateChanged(user => {
            if (user) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                document.getElementById('userEmailLabel').innerText = user.email;
                checkRole(user.email);
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                loadingMsg.classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }

        async function checkRole(email) {
            const adminDoc = await db.collection('admins').doc(email).get();
            if (adminDoc.exists) {
                document.getElementById('roleLabel').innerText = "ADMIN";
                adminView.classList.remove('hidden');
                employeeView.classList.add('hidden');
                loadAllEmployees();
            } else {
                document.getElementById('roleLabel').innerText = "EMPLOYEE";
                employeeView.classList.remove('hidden');
                adminView.classList.add('hidden');
                loadMyDetails(email);
            }
        }

        function loadAllEmployees() {
            db.collection('employees').onSnapshot(snapshot => {
                const tbody = document.getElementById('employeeTableBody');
                document.getElementById('empCount').innerText = snapshot.size;
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const emp = doc.data();
                    const id = doc.id;
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-4 flex items-center gap-3">
                                <img src="${emp.imageUrl || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-full border">
                                <div>
                                    <div class="font-bold text-gray-800">${emp.name}</div>
                                    <div class="text-xs text-gray-500">ID: ${id}</div>
                                </div>
                            </td>
                            <td class="p-4 text-sm text-gray-600">${emp.designation}</td>
                            <td class="p-4 text-sm">${emp.contactNo}</td>
                            <td class="p-4">
                                <span class="px-2 py-1 rounded-full text-xs font-bold ${emp.isBlocked ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                    ${emp.isBlocked ? 'BLOCKED' : 'ACTIVE'}
                                </span>
                            </td>
                            <td class="p-4">
                                <button onclick="toggleBlock('${id}', ${emp.isBlocked})" class="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded text-sm transition-all">
                                    ${emp.isBlocked ? 'Unblock' : 'Block'}
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        async function loadMyDetails(email) {
            const snapshot = await db.collection('employees').where('email', '==', email).get();
            const card = document.getElementById('myDetailsCard');
            if (!snapshot.empty) {
                const emp = snapshot.docs[0].data();
                card.innerHTML = `
                    <img src="${emp.imageUrl || 'https://via.placeholder.com/150'}" class="w-32 h-32 rounded-full mx-auto mb-6 border-4 border-blue-50 shadow-lg object-cover">
                    <h2 class="text-3xl font-bold text-gray-800">${emp.name}</h2>
                    <p class="text-blue-600 font-bold tracking-widest uppercase text-sm mb-6">${emp.designation}</p>
                    
                    <div class="grid grid-cols-2 gap-4 text-left border-t pt-6">
                        <div><p class="text-xs text-gray-400">EMPLOYEE ID</p><p class="font-medium">${snapshot.docs[0].id}</p></div>
                        <div><p class="text-xs text-gray-400">DEPARTMENT</p><p class="font-medium">${emp.department}</p></div>
                        <div><p class="text-xs text-gray-400">CONTACT</p><p class="font-medium">${emp.contactNo}</p></div>
                        <div><p class="text-xs text-gray-400">BLOOD GROUP</p><p class="font-medium text-red-600">${emp.bloodGroup}</p></div>
                    </div>

                    ${emp.isBlocked ? '<div class="mt-8 p-3 bg-red-600 text-white rounded-lg font-bold animate-bounce">ACCESS DENIED - ACCOUNT BLOCKED</div>' : ''}
                `;
            } else {
                card.innerHTML = `<div class="text-red-500 font-bold">No employee record found for: ${email}</div>`;
            }
        }

        function toggleBlock(id, currentStatus) {
            if(confirm("Are you sure?")) {
                db.collection('employees').doc(id).update({ isBlocked: !currentStatus });
            }
        }

        function searchEmployee(query) {
            const rows = document.querySelectorAll('#employeeTableBody tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
