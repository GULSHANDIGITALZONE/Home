<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGE - Admin & Employee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Login Section -->
    <div id="loginSection" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">NEWGRACE ENTERPRISES</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded">
                <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded">
                <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Login</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard (Admin/User) -->
    <div id="dashboardSection" class="hidden min-h-screen">
        <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg">
            <h1 class="text-xl font-bold">NGE Portal (<span id="roleLabel">...</span>)</h1>
            <div class="flex items-center gap-4">
                <span id="userEmailLabel" class="text-sm"></span>
                <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm">Logout</button>
            </div>
        </nav>

        <main class="p-6">
            <!-- Admin View -->
            <div id="adminView" class="hidden">
                <div class="flex justify-between mb-4">
                    <input type="text" onkeyup="searchEmployee(this.value)" placeholder="Search Name or ID..." class="p-2 border rounded w-1/3 shadow-sm">
                    <button onclick="showAddModal()" class="bg-green-600 text-white px-4 py-2 rounded shadow">+ Add Employee</button>
                </div>
                <div class="bg-white rounded-lg shadow overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-3 border-b">Photo</th>
                                <th class="p-3 border-b">ID / Name</th>
                                <th class="p-3 border-b">Designation</th>
                                <th class="p-3 border-b">Contact</th>
                                <th class="p-3 border-b">Status</th>
                                <th class="p-3 border-b">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Employee View -->
            <div id="employeeView" class="hidden flex justify-center">
                <div id="myDetailsCard" class="bg-white p-6 rounded-xl shadow-xl border-t-4 border-blue-500 w-full max-w-md text-center">
                    <!-- My details will load here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA_Xe1b5ru1l4_aSzOXVGCbiuLxK53So70",
  authDomain: "newgrace-enterprises.firebaseapp.com",
  projectId: "newgrace-enterprises",
  storageBucket: "newgrace-enterprises.firebasestorage.app",
  messagingSenderId: "429562265089",
  appId: "1:429562265089:web:9a02e3acbea803b6a9ca00",
  measurementId: "G-RB1PSX5B89"
};
        // -------------------------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // UI Elements
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const adminView = document.getElementById('adminView');
        const employeeView = document.getElementById('employeeView');

        // Check Auth State
        auth.onAuthStateChanged(user => {
            if (user) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                document.getElementById('userEmailLabel').innerText = user.email;
                checkRole(user.email);
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut(); }

        async function checkRole(email) {
            const adminDoc = await db.collection('admins').doc(email).get();
            if (adminDoc.exists) {
                document.getElementById('roleLabel').innerText = "Admin";
                adminView.classList.remove('hidden');
                loadAllEmployees();
            } else {
                document.getElementById('roleLabel').innerText = "Employee";
                employeeView.classList.remove('hidden');
                loadMyDetails(email);
            }
        }

        // Admin: Load List
        function loadAllEmployees() {
            db.collection('employees').onSnapshot(snapshot => {
                const tbody = document.getElementById('employeeTableBody');
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const emp = doc.data();
                    const id = doc.id;
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-3"><img src="${emp.imageUrl || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-full object-cover"></td>
                            <td class="p-3 font-bold">${id}<br><span class="text-sm font-normal text-gray-600">${emp.name}</span></td>
                            <td class="p-3">${emp.designation}</td>
                            <td class="p-3">${emp.contactNo}</td>
                            <td class="p-3">${emp.isBlocked ? '<span class="text-red-500">Blocked</span>' : '<span class="text-green-500">Active</span>'}</td>
                            <td class="p-3">
                                <button onclick="toggleBlock('${id}', ${emp.isBlocked})" class="text-blue-600 mr-2">${emp.isBlocked ? 'Unblock' : 'Block'}</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        // User: Load Details
        async function loadMyDetails(email) {
            const snapshot = await db.collection('employees').where('email', '==', email).get();
            const card = document.getElementById('myDetailsCard');
            if (!snapshot.empty) {
                const emp = snapshot.docs[0].data();
                card.innerHTML = `
                    <img src="${emp.imageUrl || 'https://via.placeholder.com/150'}" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-blue-100">
                    <h2 class="text-2xl font-bold">${emp.name}</h2>
                    <p class="text-blue-600 font-medium">${emp.designation}</p>
                    <div class="mt-4 text-left space-y-2 border-t pt-4">
                        <p><strong>ID:</strong> ${snapshot.docs[0].id}</p>
                        <p><strong>Dept:</strong> ${emp.department}</p>
                        <p><strong>Phone:</strong> ${emp.contactNo}</p>
                        <p><strong>Blood:</strong> ${emp.bloodGroup}</p>
                    </div>
                    ${emp.isBlocked ? '<div class="mt-4 p-2 bg-red-100 text-red-600 rounded">Account Blocked by Admin</div>' : ''}
                `;
            } else { card.innerHTML = "No employee record found."; }
        }

        function toggleBlock(id, currentStatus) {
            db.collection('employees').doc(id).update({ isBlocked: !currentStatus });
        }

        function searchEmployee(query) {
            const rows = document.querySelectorAll('#employeeTableBody tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
