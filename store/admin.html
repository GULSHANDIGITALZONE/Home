<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./store.css">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <div class="brand-block">
        <div class="brand-badge">AD</div>
        <div class="brand-text">
          <strong>Store Admin Panel</strong>
          <span>Products aur orders manage karne ke liye</span>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn btn-secondary" href="./index.html">Store Home</a>
        <button id="adminLogoutBtn" class="btn btn-primary" type="button" hidden>Logout</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <section class="container admin-layout">
      <div class="admin-card">
        <h2>Admin Login</h2>
        <form id="adminLoginForm" class="form-grid">
          <div class="field">
            <label for="adminUsername">Username</label>
            <input id="adminUsername" required placeholder="Enter admin username">
          </div>
          <div class="field">
            <label for="adminPassword">Password</label>
            <input id="adminPassword" type="password" required placeholder="Enter admin password">
          </div>
          <div class="modal-actions">
            <button class="btn btn-primary" type="submit">Login</button>
          </div>
          <p id="adminLoginStatus" class="admin-status"></p>
        </form>
      </div>

      <div id="adminDashboard" class="admin-dashboard" hidden>
        <div class="admin-grid">
          <section class="admin-card">
            <div class="admin-section-head">
              <h2>Product Form</h2>
              <button id="resetProductFormBtn" class="btn btn-secondary" type="button">Reset</button>
            </div>

            <form id="productForm" class="form-grid">
              <input type="hidden" id="productDocId">
              <div class="field">
                <label for="productId">Product ID</label>
                <input id="productId" required placeholder="unique-product-id">
              </div>
              <div class="field">
                <label for="productTitle">Title</label>
                <input id="productTitle" required placeholder="Product title">
              </div>
              <div class="field">
                <label for="productDetails">Details</label>
                <input id="productDetails" required placeholder="Product details">
              </div>
              <div class="field">
                <label for="productAmount">Amount</label>
                <input id="productAmount" type="number" required placeholder="499">
              </div>
              <div class="field">
                <label for="productImage">Image URL</label>
                <input id="productImage" required placeholder="../blog.png">
              </div>
              <div class="field">
                <label for="productType">Type</label>
                <select id="productType" class="admin-select">
                  <option value="download">Download</option>
                  <option value="order">Order</option>
                </select>
              </div>
              <div class="field">
                <label for="productActionLabel">Action Label</label>
                <input id="productActionLabel" required placeholder="Download Now">
              </div>
              <div class="field">
                <label for="productActionUrl">Action URL</label>
                <input id="productActionUrl" required placeholder="https://example.com/file">
              </div>
              <div class="field">
                <label for="productFeatures">Features</label>
                <textarea id="productFeatures" class="admin-textarea" placeholder="Feature 1, Feature 2, Feature 3"></textarea>
              </div>
              <div class="modal-actions">
                <button id="saveProductBtn" class="btn btn-primary" type="submit">Save Product</button>
              </div>
              <p id="productFormStatus" class="admin-status"></p>
            </form>
          </section>

          <section class="admin-card">
            <div class="admin-section-head">
              <h2>Products</h2>
              <button id="refreshProductsBtn" class="btn btn-secondary" type="button">Refresh</button>
            </div>
            <div id="adminProductsList" class="stack-list"></div>
          </section>
        </div>

        <section class="admin-card admin-orders">
          <div class="admin-section-head">
            <h2>Orders</h2>
            <button id="refreshOrdersBtn" class="btn btn-secondary" type="button">Refresh</button>
          </div>
          <div id="adminOrdersList" class="stack-list"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="adminToast" class="toast" role="status" aria-live="polite"></div>

  <script src="./store-config.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
