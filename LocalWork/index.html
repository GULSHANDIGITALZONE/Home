<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kam Karo - Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-link { color: #2563eb; background: #eff6ff; border-top: 2px solid #2563eb; }
        @media (min-width: 768px) {
            .active-link { border-top: none; border-left: 4px solid #2563eb; background: #eff6ff; }
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Sidebar for Desktop -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-white shadow-lg hidden md:block">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-blue-600">Kam Karo</h1>
        </div>
        <nav class="mt-6">
            <a href="#" onclick="showSection('home')" class="flex items-center px-6 py-4 text-gray-700 hover:bg-gray-100 transition" id="nav-home-desktop">
                <i class="fas fa-home mr-3 w-5"></i> Home
            </a>
            <a href="#" onclick="showSection('post')" class="flex items-center px-6 py-4 text-gray-700 hover:bg-gray-100 transition" id="nav-post-desktop">
                <i class="fas fa-plus-circle mr-3 w-5"></i> Post Job
            </a>
            <a href="#" onclick="showSection('chat')" class="flex items-center px-6 py-4 text-gray-700 hover:bg-gray-100 transition" id="nav-chat-desktop">
                <i class="fas fa-comments mr-3 w-5"></i> Chat
            </a>
            <a href="#" onclick="showSection('account')" class="flex items-center px-6 py-4 text-gray-700 hover:bg-gray-100 transition" id="nav-account-desktop">
                <i class="fas fa-user mr-3 w-5"></i> Account
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="md:ml-64 pb-20 md:pb-0">
        <!-- Header -->
        <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 id="section-title" class="text-xl font-semibold text-blue-800">Home</h2>
            <div id="user-profile" class="flex items-center space-x-2 cursor-pointer">
                <!-- User profile content injected by JS -->
                <span id="user-name" class="hidden sm:inline font-medium">Guest</span>
                <img id="user-img" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-blue-100 object-cover">
            </div>
        </header>

        <!-- Dynamic Sections -->
        
        <!-- Home Section -->
        <section id="home-section" class="p-4 max-w-4xl mx-auto">
            <div id="jobs-container" class="grid gap-4">
                <div class="flex justify-center p-10"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-600"></i></div>
            </div>
        </section>

        <!-- Post Section -->
        <section id="post-section" class="p-4 max-w-2xl mx-auto hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="text-xl font-bold mb-6 text-gray-800">Post a New Job</h3>
                <form id="job-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
                        <input type="text" id="job-title" required placeholder="e.g. Electrician needed for home repair" class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                            <select id="job-category" class="w-full border p-3 rounded-xl outline-none">
                                <option>General</option>
                                <option>Construction</option>
                                <option>Cleaning</option>
                                <option>Electrician</option>
                                <option>Plumbing</option>
                                <option>Delivery</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Expected Rate</label>
                            <input type="text" id="job-rate" placeholder="₹ 500 / day" class="w-full border p-3 rounded-xl outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="job-desc" required placeholder="Tell us more about the work..." class="w-full border p-3 rounded-xl h-32 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Post Job Now</button>
                </form>
            </div>
        </section>

        <!-- Chat Section -->
        <section id="chat-section" class="p-4 max-w-4xl mx-auto hidden">
            <!-- Chat list injected by JS -->
            <div class="text-center py-20 text-gray-500">
                <i class="fas fa-comments text-5xl mb-4 block"></i>
                <p>Select a conversation to start chatting.</p>
            </div>
        </section>

        <!-- Account Section -->
        <section id="account-section" class="p-4 max-w-2xl mx-auto hidden">
            <div class="bg-white p-8 rounded-2xl shadow-sm border text-center">
                <div class="relative inline-block">
                    <img id="profile-large-img" src="https://via.placeholder.com/120" class="mx-auto w-32 h-32 rounded-full border-4 border-white shadow-xl object-cover">
                    <div class="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full border-2 border-white">
                        <i class="fas fa-camera text-xs"></i>
                    </div>
                </div>
                <h2 id="profile-name" class="text-2xl font-bold mt-6 text-gray-800">Guest User</h2>
                <p id="profile-email" class="text-gray-500 mb-8">Login to manage your profile</p>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-blue-50 p-4 rounded-xl text-center">
                        <span class="block text-2xl font-bold text-blue-600">0</span>
                        <span class="text-xs text-blue-400 uppercase font-semibold">Jobs Posted</span>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl text-center">
                        <span class="block text-2xl font-bold text-green-600">0.0</span>
                        <span class="text-xs text-green-400 uppercase font-semibold">Rating</span>
                    </div>
                </div>

                <button onclick="logout()" class="w-full bg-red-50 text-red-600 font-bold py-3 rounded-xl hover:bg-red-100 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </button>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation for Mobile -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t flex md:hidden justify-around items-center h-16 z-20 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="showSection('home')" class="flex flex-col items-center flex-1 py-2 text-gray-400" id="nav-home-mobile">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Home</span>
        </button>
        <button onclick="showSection('post')" class="flex flex-col items-center flex-1 py-2 text-gray-400" id="nav-post-mobile">
            <i class="fas fa-plus-circle text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Post</span>
        </button>
        <button onclick="showSection('chat')" class="flex flex-col items-center flex-1 py-2 text-gray-400" id="nav-chat-mobile">
            <i class="fas fa-comments text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Chat</span>
        </button>
        <button onclick="showSection('account')" class="flex flex-col items-center flex-1 py-2 text-gray-400" id="nav-account-mobile">
            <i class="fas fa-user text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Account</span>
        </button>
    </nav>

    <!-- Job Details Modal -->
    <div id="job-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div id="modal-content" class="p-6">
                <!-- Modal content injected by JS -->
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-6 py-2 text-gray-600 font-medium">Close</button>
                <button id="modal-action-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-md">Contact Worker</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK & App Logic -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
